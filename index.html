<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Fader</title>
  <style>
    /* ── Theme tokens ───────────────────────────────────────────────────────── */
    :root {
      --bg:              #0f0f18;
      --bg-header:       #13131f;
      --bg-panel:        #17172200;
      --bg-panel-solid:  #171722;
      --bg-input:        #0f0f1c;
      --bg-btn:          #22223a;
      --bg-btn-load:     #220d3e;
      --bg-play-btn:     #1a1a28;
      --bg-fade:         linear-gradient(160deg, #250d42 0%, #102240 100%);
      --bg-badge-idle:   #1c1c2c;
      --border:          #34344e;
      --border-load:     #6d28d9;
      --border-focus:    #7c3aed;
      --text:            #eceef5;
      --text-muted:      #9095b0;
      --text-dim:        #737898;
      --text-faint:      #565a7a;
      --placeholder:     #484c6e;
      --vol-track:       #26263e;
      --progress-track:  #1e1e32;
      --badge-idle-text: #8890b0;
      --badge-idle-bord: #404060;
      --fade-btn-color:  #d0c4ff;
      --fade-btn-dis-bg: #141420;
      --fade-btn-dis-bd: #282838;
      --fade-btn-dis-tx: #606080;
      --footer-text:     #404060;
      --toggle-bg:       #22223a;
      --toggle-border:   #34344e;
      --toggle-text:     #9095b0;
    }

    html.light {
      --bg:              #f2f2fa;
      --bg-header:       #fafaff;
      --bg-panel:        #ffffff00;
      --bg-panel-solid:  #ffffff;
      --bg-input:        #f5f5fd;
      --bg-btn:          #eaeaf5;
      --bg-btn-load:     #ede8ff;
      --bg-play-btn:     #f5f5fd;
      --bg-fade:         linear-gradient(160deg, #ede8ff 0%, #deeeff 100%);
      --bg-badge-idle:   #eeeef8;
      --border:          #c8c8e0;
      --border-load:     #7c3aed;
      --border-focus:    #7c3aed;
      --text:            #18182e;
      --text-muted:      #505070;
      --text-dim:        #686888;
      --text-faint:      #9090b0;
      --placeholder:     #9898b8;
      --vol-track:       #d4d4ec;
      --progress-track:  #d4d4ec;
      --badge-idle-text: #7070a0;
      --badge-idle-bord: #c0c0dc;
      --fade-btn-color:  #4c1d95;
      --fade-btn-dis-bg: #f0f0f8;
      --fade-btn-dis-bd: #d0d0e8;
      --fade-btn-dis-tx: #a0a0c0;
      --footer-text:     #a0a0c0;
      --toggle-bg:       #eaeaf5;
      --toggle-border:   #c8c8e0;
      --toggle-text:     #505070;
    }

    /* ── Reset ──────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    header {
      position: relative;
      text-align: center;
      padding: 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-header);
      transition: background 0.2s, border-color 0.2s;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-top: 0.2rem;
      letter-spacing: 0.05em;
    }

    /* ── Theme toggle ───────────────────────────────────────────────────────── */
    #theme-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      border-radius: 8px;
      color: var(--toggle-text);
      padding: 0.4rem 0.6rem;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    #theme-toggle:hover {
      border-color: var(--border-focus);
      color: var(--text);
    }
    #theme-toggle .toggle-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Layout ─────────────────────────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      padding: 1.25rem;
      align-items: flex-start;
    }

    /* ── Deck panels ─────────────────────────────────────────────────────────── */
    .panel {
      flex: 1;
      background: var(--bg-panel-solid);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.125rem;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
      min-width: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .deck-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Status badges ───────────────────────────────────────────────────────── */
    .status-badge {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .status-badge.playing { background: #052e16; color: #4ade80; border: 1px solid #16a34a; }
    .status-badge.paused  { background: #2a1800; color: #fbbf24; border: 1px solid #d97706; }
    .status-badge.ready   { background: #150d30; color: #a78bfa; border: 1px solid #6d28d9; }
    .status-badge.idle    {
      background: var(--bg-badge-idle);
      color: var(--badge-idle-text);
      border: 1px solid var(--badge-idle-bord);
    }

    /* ── URL input row ───────────────────────────────────────────────────────── */
    .url-row {
      display: flex;
      gap: 0.5rem;
    }

    .url-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.45rem 0.75rem;
      color: var(--text);
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.15s, background 0.2s;
      min-width: 0;
    }
    .url-input:focus { border-color: var(--border-focus); }
    .url-input::placeholder { color: var(--placeholder); }

    .btn {
      background: var(--bg-btn);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 0.45rem 0.875rem;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn:hover:not(:disabled) { border-color: var(--border-focus); }
    .btn:active:not(:disabled) { transform: translateY(1px); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-load {
      background: var(--bg-btn-load);
      border-color: var(--border-load);
      color: #c4b5fd;
    }
    html.light .btn-load { color: #5b21b6; }
    .btn-load:hover:not(:disabled) { border-color: #8b5cf6; }

    /* ── YouTube player ──────────────────────────────────────────────────────── */
    .player-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .player-wrapper > div,
    .player-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .player-placeholder {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-faint);
      font-size: 0.8rem;
      pointer-events: none;
      gap: 0.625rem;
      letter-spacing: 0.05em;
    }
    .player-placeholder svg { width: 40px; height: 40px; }

    /* ── Volume control ──────────────────────────────────────────────────────── */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .volume-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      width: 2.5rem;
      flex-shrink: 0;
    }

    .volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: var(--vol-track);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      min-width: 0;
      transition: background 0.2s;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px;
      height: 13px;
      background: #7c3aed;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.1s, background 0.1s;
    }
    .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.25); background: #8b5cf6; }
    .volume-slider::-moz-range-thumb {
      width: 13px;
      height: 13px;
      background: #7c3aed;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    .volume-value {
      font-size: 0.72rem;
      color: var(--text-muted);
      width: 2.5rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    /* ── Play/Pause button ───────────────────────────────────────────────────── */
    .play-btn {
      width: 100%;
      padding: 0.55rem;
      background: var(--bg-play-btn);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }
    .play-btn:hover:not(:disabled) { border-color: var(--border-focus); color: var(--text); }
    .play-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .play-btn.playing { border-color: #15803d; color: #4ade80; background: #071e0e; }
    .play-btn.paused  { border-color: #b45309; color: #fbbf24; background: #1a0e00; }

    /* ── Center controls ─────────────────────────────────────────────────────── */
    .center-controls {
      width: 148px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 1rem;
      padding: 1.125rem 0.875rem;
      position: sticky;
      top: 1.25rem;
    }

    .flow-indicator {
      font-size: 1.4rem;
      color: var(--text-faint);
      transition: color 0.3s;
      line-height: 1;
    }
    .flow-indicator.active { color: #7c3aed; }

    /* ── FADE button ─────────────────────────────────────────────────────────── */
    .fade-btn {
      width: 100%;
      padding: 0.9rem 0.5rem;
      background: var(--bg-fade);
      border: 1px solid var(--border-load);
      border-radius: 12px;
      color: var(--fade-btn-color);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .fade-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(124,58,237,0.2), rgba(59,130,246,0.2));
      opacity: 0;
      transition: opacity 0.2s;
    }
    .fade-btn:hover:not(:disabled)::after { opacity: 1; }
    .fade-btn:hover:not(:disabled) {
      border-color: #8b5cf6;
      box-shadow: 0 0 18px rgba(124,58,237,0.25);
    }
    .fade-btn:disabled {
      cursor: not-allowed;
      background: var(--fade-btn-dis-bg);
      border-color: var(--fade-btn-dis-bd);
      color: var(--fade-btn-dis-tx);
    }
    .fade-btn.fading {
      border-color: #3b82f6;
      color: #93c5fd;
      animation: pulse-glow 1.2s ease-in-out infinite;
      cursor: not-allowed;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 8px rgba(59,130,246,0.2); }
      50%       { box-shadow: 0 0 22px rgba(59,130,246,0.5); }
    }

    /* ── Fade progress bar ───────────────────────────────────────────────────── */
    .fade-progress-wrap { width: 100%; }

    .fade-progress-bar {
      width: 100%;
      height: 3px;
      background: var(--progress-track);
      border-radius: 2px;
      overflow: hidden;
    }

    .fade-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #3b82f6);
      border-radius: 2px;
      width: 0%;
      transition: width 0.08s linear;
    }

    .fade-progress-label {
      font-size: 0.6rem;
      color: var(--text-dim);
      text-align: center;
      margin-top: 0.3rem;
      letter-spacing: 0.08em;
      font-variant-numeric: tabular-nums;
    }

    /* ── Fade duration control ───────────────────────────────────────────────── */
    .setting-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .setting-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .duration-input {
      width: 52px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.5rem;
      color: var(--text);
      font-size: 0.82rem;
      text-align: center;
      outline: none;
      transition: border-color 0.15s, background 0.2s;
    }
    .duration-input:focus { border-color: var(--border-focus); }

    .setting-unit {
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    /* ── Footer ──────────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 0.75rem;
      border-top: 1px solid var(--border);
      color: var(--footer-text);
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      transition: color 0.2s, border-color 0.2s;
    }

    /* ── Responsive ──────────────────────────────────────────────────────────── */
    @media (max-width: 860px) {
      main { flex-direction: column; }
      .center-controls {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        position: static;
        padding: 0.5rem 1rem;
      }
      .fade-btn { width: auto; padding: 0.75rem 2rem; }
      .flow-indicator { display: none; }
      #theme-toggle .toggle-label { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>YouTube Fader</h1>
  <p>Seamless audio transitions for your tabletop sessions</p>
  <button id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
    <span id="theme-icon">☀</span>
    <span class="toggle-label" id="theme-label">Light</span>
  </button>
</header>

<main>

  <!-- ── Deck A ── -->
  <div class="panel">
    <div class="panel-header">
      <span class="deck-label">Deck A</span>
      <span class="status-badge idle" id="status1">Idle</span>
    </div>

    <div class="url-row">
      <input type="text" class="url-input" id="url1"
             placeholder="Paste YouTube URL…"
             onkeydown="if(event.key==='Enter') loadVideo(1)">
      <button class="btn btn-load" onclick="loadVideo(1)">Load</button>
    </div>

    <div class="player-wrapper">
      <div id="player1"></div>
      <div class="player-placeholder" id="placeholder1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        Load a video above
      </div>
    </div>

    <div class="volume-row">
      <span class="volume-label">Vol</span>
      <input type="range" class="volume-slider" id="vol1" min="0" max="100" value="100"
             oninput="setVolume(1, this.value)">
      <span class="volume-value" id="vol1-display">100%</span>
    </div>

    <button class="play-btn" id="play-btn1" onclick="togglePlay(1)" disabled>
      <span id="play-icon1">▶</span>
      <span id="play-text1">Play</span>
    </button>
  </div>

  <!-- ── Center controls ── -->
  <div class="center-controls">

    <div class="flow-indicator" id="flow-indicator">⇄</div>

    <button class="fade-btn" id="fade-btn" onclick="startFade()" disabled>
      FADE
    </button>

    <div class="fade-progress-wrap" id="fade-progress-wrap" style="display:none">
      <div class="fade-progress-bar">
        <div class="fade-progress-fill" id="fade-progress-fill"></div>
      </div>
      <div class="fade-progress-label" id="fade-progress-label">0%</div>
    </div>

    <div class="setting-group">
      <div class="setting-label">Fade Duration</div>
      <div class="setting-row">
        <input type="number" class="duration-input" id="fade-duration"
               value="5" min="1" max="60">
        <span class="setting-unit">sec</span>
      </div>
    </div>

  </div>

  <!-- ── Deck B ── -->
  <div class="panel">
    <div class="panel-header">
      <span class="deck-label">Deck B</span>
      <span class="status-badge idle" id="status2">Idle</span>
    </div>

    <div class="url-row">
      <input type="text" class="url-input" id="url2"
             placeholder="Paste YouTube URL…"
             onkeydown="if(event.key==='Enter') loadVideo(2)">
      <button class="btn btn-load" onclick="loadVideo(2)">Load</button>
    </div>

    <div class="player-wrapper">
      <div id="player2"></div>
      <div class="player-placeholder" id="placeholder2">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        Load a video above
      </div>
    </div>

    <div class="volume-row">
      <span class="volume-label">Vol</span>
      <input type="range" class="volume-slider" id="vol2" min="0" max="100" value="100"
             oninput="setVolume(2, this.value)">
      <span class="volume-value" id="vol2-display">100%</span>
    </div>

    <button class="play-btn" id="play-btn2" onclick="togglePlay(2)" disabled>
      <span id="play-icon2">▶</span>
      <span id="play-text2">Play</span>
    </button>
  </div>

</main>

<footer>Got an idea to improve YouTube Fader? Open a Pull Request! Check out the source code <a href="https://github.com/ToofastTurnip/YouTube-Fader">here</a>!</footer>

<script>
  // ── Load the YouTube IFrame API ──────────────────────────────────────────
  (function() {
    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  })();

  // ── Theme toggle ─────────────────────────────────────────────────────────
  var isLight = false;

  function toggleTheme() {
    isLight = !isLight;
    document.documentElement.classList.toggle('light', isLight);
    document.getElementById('theme-icon').textContent  = isLight ? '☾' : '☀';
    document.getElementById('theme-label').textContent = isLight ? 'Dark' : 'Light';
    try { localStorage.setItem('yt-fader-theme', isLight ? 'light' : 'dark'); } catch(e) {}
  }

  // Restore saved preference
  (function() {
    try {
      if (localStorage.getItem('yt-fader-theme') === 'light') toggleTheme();
    } catch(e) {}
  })();

  // ── State ────────────────────────────────────────────────────────────────
  var player1, player2;
  var p1Ready = false, p2Ready = false;
  var fadeInterval = null;
  var fadeOutNum = null, fadeInNum = null;
  var fadeStartVol = 0, fadeTargetVol = 0, fadeStartTime = 0, fadeDurationMs = 0;

  // ── YouTube API callback ─────────────────────────────────────────────────
  window.onYouTubeIframeAPIReady = function() {
    player1 = new YT.Player('player1', {
      height: '100%', width: '100%',
      playerVars: { playsinline: 1, rel: 0, modestbranding: 1 },
      events: {
        onReady:       function()  { p1Ready = true; updateUI(); },
        onStateChange: function(e) { onStateChange(1, e); }
      }
    });

    player2 = new YT.Player('player2', {
      height: '100%', width: '100%',
      playerVars: { playsinline: 1, rel: 0, modestbranding: 1 },
      events: {
        onReady:       function()  { p2Ready = true; updateUI(); },
        onStateChange: function(e) { onStateChange(2, e); }
      }
    });
  };

  // ── YouTube state change handler ─────────────────────────────────────────
  function onStateChange(num, event) {
    var s = event.data;
    if (s === YT.PlayerState.CUED     ||
        s === YT.PlayerState.PLAYING  ||
        s === YT.PlayerState.PAUSED   ||
        s === YT.PlayerState.ENDED    ||
        s === YT.PlayerState.BUFFERING) {
      document.getElementById('placeholder' + num).style.display = 'none';
      document.getElementById('play-btn' + num).disabled = false;
    }
    updateUI();
  }

  // ── Parse YouTube video ID from various URL formats ──────────────────────
  function parseVideoId(raw) {
    if (!raw) return null;
    var url = raw.trim();
    try {
      var u = new URL(url);
      if (u.hostname === 'youtu.be' || u.hostname === 'www.youtu.be') {
        return u.pathname.slice(1).split(/[/?]/)[0] || null;
      }
      if (u.hostname.includes('youtube.com')) {
        return u.searchParams.get('v') || null;
      }
    } catch (e) {}
    var m = url.match(/(?:[?&]v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  // ── Load a video into a deck ─────────────────────────────────────────────
  function loadVideo(num) {
    var url = document.getElementById('url' + num).value.trim();
    var id  = parseVideoId(url);

    if (!id) {
      alert('Please enter a valid YouTube video URL.');
      return;
    }

    var player = num === 1 ? player1 : player2;
    if (!player || typeof player.cueVideoById !== 'function') {
      alert('Player not ready yet — please wait a moment and try again.');
      return;
    }

    player.cueVideoById(id);
    document.getElementById('placeholder' + num).style.display = 'none';
    document.getElementById('play-btn' + num).disabled = false;
    updateUI();
  }

  // ── Toggle play / pause ──────────────────────────────────────────────────
  function togglePlay(num) {
    var player = num === 1 ? player1 : player2;
    if (!player) return;
    if (player.getPlayerState() === YT.PlayerState.PLAYING) {
      player.pauseVideo();
    } else {
      player.playVideo();
    }
  }

  // ── Set volume from slider ───────────────────────────────────────────────
  function setVolume(num, value) {
    var player = num === 1 ? player1 : player2;
    if (player && typeof player.setVolume === 'function') {
      player.setVolume(parseInt(value, 10));
    }
    document.getElementById('vol' + num + '-display').textContent = value + '%';
  }

  // ── Safe wrapper: get player state ───────────────────────────────────────
  function getState(num) {
    try {
      var p = num === 1 ? player1 : player2;
      if (!p || typeof p.getPlayerState !== 'function') return -1;
      return p.getPlayerState();
    } catch (e) { return -1; }
  }

  // ── Update all UI elements to reflect current state ──────────────────────
  function updateUI() {
    if (typeof YT === 'undefined' || !YT.PlayerState) return;

    updateDeckUI(1);
    updateDeckUI(2);

    var s1 = getState(1);
    var s2 = getState(2);
    var P  = YT.PlayerState;

    var playing1  = s1 === P.PLAYING;
    var playing2  = s2 === P.PLAYING;
    var inactive1 = s1 === P.PAUSED || s1 === P.CUED || s1 === P.ENDED;
    var inactive2 = s2 === P.PAUSED || s2 === P.CUED || s2 === P.ENDED;

    var canFade = (fadeInterval === null) && (
      (playing1 && inactive2) || (playing2 && inactive1)
    );

    var fadeBtn = document.getElementById('fade-btn');
    if (fadeInterval === null) {
      fadeBtn.disabled = !canFade;
      fadeBtn.classList.remove('fading');
      fadeBtn.textContent = 'FADE';
    }

    var indicator = document.getElementById('flow-indicator');
    if (playing1 && inactive2) {
      indicator.textContent = '→';
      indicator.classList.add('active');
    } else if (playing2 && inactive1) {
      indicator.textContent = '←';
      indicator.classList.add('active');
    } else {
      indicator.textContent = '⇄';
      indicator.classList.remove('active');
    }
  }

  function updateDeckUI(num) {
    var state    = getState(num);
    var statusEl = document.getElementById('status' + num);
    var playBtn  = document.getElementById('play-btn' + num);
    var icon     = document.getElementById('play-icon' + num);
    var label    = document.getElementById('play-text' + num);

    if (typeof YT === 'undefined' || !YT.PlayerState) return;
    var P = YT.PlayerState;

    switch (state) {
      case P.PLAYING:
        statusEl.className = 'status-badge playing';
        statusEl.textContent = 'Playing';
        playBtn.className = 'play-btn playing';
        icon.textContent  = '⏸';
        label.textContent = 'Pause';
        playBtn.disabled  = false;
        break;

      case P.PAUSED:
        statusEl.className = 'status-badge paused';
        statusEl.textContent = 'Paused';
        playBtn.className = 'play-btn paused';
        icon.textContent  = '▶';
        label.textContent = 'Play';
        playBtn.disabled  = false;
        break;

      case P.BUFFERING:
        statusEl.className = 'status-badge idle';
        statusEl.textContent = 'Loading…';
        playBtn.disabled = true;
        break;

      case P.CUED:
        statusEl.className = 'status-badge ready';
        statusEl.textContent = 'Ready';
        playBtn.className = 'play-btn';
        icon.textContent  = '▶';
        label.textContent = 'Play';
        playBtn.disabled  = false;
        break;

      case P.ENDED:
        statusEl.className = 'status-badge idle';
        statusEl.textContent = 'Ended';
        playBtn.className = 'play-btn';
        icon.textContent  = '▶';
        label.textContent = 'Replay';
        playBtn.disabled  = false;
        break;

      default:
        statusEl.className = 'status-badge idle';
        statusEl.textContent = 'Idle';
        playBtn.className = 'play-btn';
        icon.textContent  = '▶';
        label.textContent = 'Play';
        break;
    }
  }

  // ── Begin crossfade ──────────────────────────────────────────────────────
  function startFade() {
    if (fadeInterval) return;

    var s1 = getState(1);
    var s2 = getState(2);
    var P  = YT.PlayerState;

    if (s1 === P.PLAYING) {
      fadeOutNum = 1; fadeInNum = 2;
    } else if (s2 === P.PLAYING) {
      fadeOutNum = 2; fadeInNum = 1;
    } else {
      return;
    }

    var outPlayer = fadeOutNum === 1 ? player1 : player2;
    var inPlayer  = fadeInNum  === 1 ? player1 : player2;

    fadeStartVol  = outPlayer.getVolume();
    var rawTarget = parseInt(document.getElementById('vol' + fadeInNum).value, 10);
    fadeTargetVol = (isNaN(rawTarget) || rawTarget <= 0) ? 100 : rawTarget;

    fadeDurationMs = Math.max(1000, Math.min(60000,
      (parseFloat(document.getElementById('fade-duration').value) || 5) * 1000
    ));
    fadeStartTime = Date.now();

    inPlayer.setVolume(0);
    document.getElementById('vol' + fadeInNum).value = 0;
    document.getElementById('vol' + fadeInNum + '-display').textContent = '0%';
    inPlayer.playVideo();

    var fadeBtn = document.getElementById('fade-btn');
    fadeBtn.disabled  = true;
    fadeBtn.classList.add('fading');
    fadeBtn.textContent = 'FADING…';

    document.getElementById('fade-progress-wrap').style.display = 'block';

    fadeInterval = setInterval(tickFade, 50);
  }

  // ── Fade tick (called every 50 ms) ───────────────────────────────────────
  function tickFade() {
    var elapsed  = Date.now() - fadeStartTime;
    var progress = Math.min(elapsed / fadeDurationMs, 1);

    var outVol = Math.round(fadeStartVol  * (1 - progress));
    var inVol  = Math.round(fadeTargetVol * progress);

    var outPlayer = fadeOutNum === 1 ? player1 : player2;
    var inPlayer  = fadeInNum  === 1 ? player1 : player2;

    outPlayer.setVolume(outVol);
    inPlayer.setVolume(inVol);

    document.getElementById('vol' + fadeOutNum).value = outVol;
    document.getElementById('vol' + fadeOutNum + '-display').textContent = outVol + '%';
    document.getElementById('vol' + fadeInNum).value  = inVol;
    document.getElementById('vol' + fadeInNum  + '-display').textContent = inVol  + '%';

    var pct = Math.round(progress * 100);
    document.getElementById('fade-progress-fill').style.width = pct + '%';
    document.getElementById('fade-progress-label').textContent = pct + '%';

    if (progress >= 1) { finishFade(); }
  }

  // ── Wrap up after fade completes ─────────────────────────────────────────
  function finishFade() {
    clearInterval(fadeInterval);
    fadeInterval = null;

    var outPlayer = fadeOutNum === 1 ? player1 : player2;
    outPlayer.pauseVideo();
    outPlayer.setVolume(fadeStartVol);
    document.getElementById('vol' + fadeOutNum).value = fadeStartVol;
    document.getElementById('vol' + fadeOutNum + '-display').textContent = fadeStartVol + '%';

    document.getElementById('fade-progress-wrap').style.display = 'none';
    document.getElementById('fade-progress-fill').style.width   = '0%';
    document.getElementById('fade-progress-label').textContent  = '0%';

    fadeOutNum = fadeInNum = null;
    updateUI();
  }

  // ── Periodic sync (catches any missed state change events) ───────────────
  setInterval(updateUI, 800);
</script>

</body>
</html>
